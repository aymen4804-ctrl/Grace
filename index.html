<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Grace Products</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --tg-bg: var(--tg-theme-bg-color, #f9fafb);
      --tg-text: var(--tg-theme-text-color, #111827);
      --tg-hint: var(--tg-theme-hint-color, #6b7280);
      --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #ffffff);
      --tg-section-bg: var(--tg-theme-section-bg-color, #f1f5f9);
      --tg-accent: var(--tg-theme-button-color, #6366f1);
      --tg-accent-text: var(--tg-theme-button-text-color, #ffffff);
      --success: #10b981;
      --vibrant: #7c3aed;
      --radius: 1.25rem;
      --radius-lg: 1.5rem;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      --transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --tg-bg: #0f172a;
        --tg-text: #f1f5f9;
        --tg-hint: #94a3b8;
        --tg-secondary-bg: #1e293b;
        --tg-section-bg: #334155;
      }
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--tg-bg);
      color: var(--tg-text);
      min-height: 100dvh;
      padding-bottom: 5.5rem;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }
    header {
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
      color: white;
      padding: 1.25rem 1rem 1.125rem;
      position: sticky;
      top: 0;
      z-index: 30;
      box-shadow: 0 4px 16px rgba(99,102,241,0.3);
    }
    h1 {
      font-size: 2.1rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 1.1;
    }
    .tagline {
      font-size: 1.08rem;
      font-weight: 500;
      background: linear-gradient(to right, #e0f2fe, #f3e8ff);
      -webkit-text-fill-color: transparent;
      margin-top: 0.4rem;
    }
    .container {
      padding: 1.25rem 1rem;
      max-width: 960px;
      margin: 0 auto;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.375rem;
    }
    .product-card {
      background: var(--tg-secondary-bg);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid rgba(226,232,240,0.5);
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      position: relative;
    }
    .dark .product-card {
      border-color: rgba(59,69,89,0.4);
    }
    .product-card:hover,
    .product-card:active {
      transform: translateY(-6px) scale(1.02);
      box-shadow: var(--shadow-md), 0 0 20px rgba(99,102,241,0.15);
    }
    .img-wrapper {
      aspect-ratio: 4 / 3;
      background: linear-gradient(135deg, #f0f9ff, #f3e8ff);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow: hidden;
    }
    .dark .img-wrapper {
      background: linear-gradient(135deg, #1e293b, #312e81);
    }
    .product-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: transform 0.45s ease;
    }
    .product-card:hover .product-img {
      transform: scale(1.08) rotate(2deg);
    }
    .card-content {
      padding: 1.125rem 1.125rem 1.375rem;
      text-align: center;
    }
    .name {
      font-size: 1.34rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      line-height: 1.25;
    }
    .size {
      font-size: 0.96rem;
      color: var(--tg-hint);
      margin-bottom: 0.8rem;
    }
    .price {
      font-size: 1.85rem;
      font-weight: 800;
      background: linear-gradient(to right, #10b981, #34d399);
      -webkit-text-fill-color: transparent;
      margin: 0.5rem 0 1.25rem;
      letter-spacing: -0.02em;
    }
    .btn {
      background: linear-gradient(to right, #6366f1, #a855f7);
      color: white;
      border: none;
      padding: 0.98rem;
      border-radius: 1rem;
      font-size: 1.08rem;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 3px 12px rgba(99,102,241,0.25);
    }
    .btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 20px rgba(99,102,241,0.35);
    }
    .btn:active {
      transform: translateY(0) scale(0.98);
    }
    .fixed-cart-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--tg-secondary-bg);
      border-top: 1px solid rgba(226,232,240,0.5);
      padding: 1rem;
      box-shadow: 0 -8px 24px rgba(0,0,0,0.15);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      backdrop-filter: blur(12px);
    }
    .dark .fixed-cart-bar {
      border-top-color: rgba(59,69,89,0.5);
    }
    .cart-total {
      font-weight: 700;
      font-size: 1.22rem;
      white-space: nowrap;
      flex: 1;
    }
    .cart-checkout-btn {
      flex: 0 0 auto;
      min-width: 200px;
      background: linear-gradient(to right, #10b981, #34d399, #059669);
      box-shadow: 0 6px 20px rgba(16,185,129,0.4);
      padding: 1.05rem 1.6rem;
      font-size: 1.15rem;
    }
    .empty-state {
      text-align: center;
      padding: 5.5rem 1.5rem 3.5rem;
      color: var(--tg-hint);
      font-size: 1.18rem;
      line-height: 1.6;
    }
    .empty-emoji {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: block;
    }
    @media (min-width: 640px) {
      .container { padding-left: 1.75rem; padding-right: 1.75rem; }
    }
  </style>
</head>
<body>
<header>
  <h1>Grace Products</h1>
  <div class="tagline">Natural • Handcrafted • Made with Love 🌿</div>
</header>
<div class="container">
  <div class="product-grid" id="productGrid"></div>
  <div id="emptyState" class="empty-state" style="display: none;">
    <span class="empty-emoji">🛍️🌿✨</span>
    Your cart is empty<br>
    Explore our vibrant natural collection today!
  </div>
</div>
<div class="fixed-cart-bar" id="cartBar" style="display: none;">
  <div class="cart-total">Total: <span id="totalPrice">Br 0.00</span></div>
  <button class="btn cart-checkout-btn" id="checkoutBtn">View Cart & Checkout</button>
</div>

<script>
// ────────────────────────────────────────────────
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.enableClosingConfirmation?.();

// Apply Telegram theme
const theme = tg.themeParams;
const root = document.documentElement;
root.style.setProperty('--tg-theme-bg-color', theme.bg_color);
root.style.setProperty('--tg-theme-text-color', theme.text_color);
root.style.setProperty('--tg-theme-hint-color', theme.hint_color);
root.style.setProperty('--tg-theme-secondary-bg-color', theme.secondary_bg_color);
root.style.setProperty('--tg-theme-section-bg-color', theme.section_bg_color || theme.secondary_bg_color);
root.style.setProperty('--tg-theme-button-color', theme.button_color);
root.style.setProperty('--tg-theme-button-text-color', theme.button_text_color);

// ────────────────────────────────────────────────
const products = [
  { id: 1, name: "Grace Liquid Soap", size: "5 liter", price: 500, img: "https://i.postimg.cc/NM8r0HyP/5l.jpg" },
  { id: 2, name: "Grace Hand Wash", size: "500 ml", price: 100, img: "https://i.postimg.cc/zG0y4rss/hand-wash.jpg" },
  { id: 3, name: "Grace Dettol", size: "500 ml", price: 100, img: "https://i.postimg.cc/SNt0P1Z8/dettol.jpg" },
  { id: 4, name: "Grace Bleach", size: "800 ml", price: 100, img: "https://i.postimg.cc/Bn1zVSPf/bll.jpg" },
  { id: 5, name: "Grace Bleach Mini", size: "300 ml", price: 50, img: "https://i.postimg.cc/NM8r0HyP/5l.jpg" },
];

let cart = [];
const SELLER_PHONE = "09848748168";   // ← NEW NUMBER
let userPhone = "";
let hasShownCallPrompt = false;       // prevent showing multiple times
// ────────────────────────────────────────────────
const productGrid = document.getElementById("productGrid");
const cartBar = document.getElementById("cartBar");
const totalPriceEl = document.getElementById("totalPrice");
const checkoutBtn = document.getElementById("checkoutBtn");
const emptyState = document.getElementById("emptyState");
// ────────────────────────────────────────────────
function renderProducts() {
  productGrid.innerHTML = products.map(p => `
    <div class="product-card">
      <div class="img-wrapper">
        <img src="${p.img}" alt="${p.name}" class="product-img" loading="lazy">
      </div>
      <div class="card-content">
        <div class="name">${p.name}</div>
        <div class="size">${p.size}</div>
        <div class="price">Br ${p.price.toFixed(2)}</div>
        <button class="btn add-to-cart" data-id="${p.id}">
          Add to Cart
        </button>
      </div>
    </div>
  `).join('');
}
// ────────────────────────────────────────────────
function updateCartUI() {
  if (cart.length === 0) {
    cartBar.style.display = "none";
    emptyState.style.display = "block";
    tg.MainButton.hide();
    return;
  }
  const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
  totalPriceEl.textContent = `Br ${total.toFixed(2)}`;
  cartBar.style.display = "flex";
  emptyState.style.display = "none";
  tg.MainButton.setText(`Checkout — Br ${total.toFixed(2)}`);
  tg.MainButton.setParams({ color: "#10b981", text_color: "#ffffff" });
  tg.MainButton.show();
}
// ────────────────────────────────────────────────
productGrid.addEventListener("click", e => {
  const btn = e.target.closest(".add-to-cart");
  if (!btn) return;

  const id = Number(btn.dataset.id);
  const product = products.find(p => p.id === id);
  if (!product) return;

  const existing = cart.find(item => item.id === id);
  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({ ...product, qty: 1 });
  }

  // === WHEN ADD TO CART IS TOUCHED → SET PHONE & GIVE OPTION TO CALL ===
  if (!userPhone) {
    userPhone = SELLER_PHONE;
  }

  // Show call prompt ONLY the very first time someone adds something
  if (!hasShownCallPrompt) {
    hasShownCallPrompt = true;
    setTimeout(() => {
      tg.showPopup({
        title: "📞 Call Grace Products",
        message: `✅ Item added!\n\nWould you like to call us right now on\n${SELLER_PHONE}\nto confirm your order?`,
        buttons: [
          { id: "call", type: "default", text: "Call Now 📞" },
          { id: "later", type: "cancel", text: "Maybe Later" }
        ]
      }, (buttonId) => {
        if (buttonId === "call") {
          tg.openLink(`tel:${SELLER_PHONE}`);
        }
      });
    }, 650); // tiny delay so user sees the cart update first
  }

  updateCartUI();
  tg.HapticFeedback?.impactOccurred("medium");
});
// ────────────────────────────────────────────────
tg.MainButton.onClick(() => {
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  tg.showPopup({
    title: "Order Confirmed 🌟",
    message: `Total: Br ${total.toFixed(2)}\n📞 Phone: ${userPhone}\n\nYour Grace order is being prepared with love! 🌿`,
    buttons: [{ type: "ok", text: "Awesome!" }]
  }, () => {
    tg.showAlert(`Thank you!\nWe will contact you on ${userPhone} (demo — cart cleared)`);
    cart = [];
    userPhone = "";
    hasShownCallPrompt = false;
    updateCartUI();
  });
});
checkoutBtn.addEventListener("click", () => tg.MainButton.click());
// ────────────────────────────────────────────────
renderProducts();
updateCartUI();
</script>
</body>
</html>
