<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Grace Products</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --tg-bg: var(--tg-theme-bg-color, #f9fafb);
      --tg-text: var(--tg-theme-text-color, #111827);
      --tg-hint: var(--tg-theme-hint-color, #6b7280);
      --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #ffffff);
      --tg-section-bg: var(--tg-theme-section-bg-color, #f1f5f9);
      --tg-accent: var(--tg-theme-button-color, #6366f1);
      --tg-accent-text: var(--tg-theme-button-text-color, #ffffff);
      --tg-destructive: #ef4444;
      --success: #10b981;
      --radius: 1.25rem;
      --radius-lg: 1.5rem;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --tg-bg: #0f172a;
        --tg-text: #f1f5f9;
        --tg-hint: #94a3b8;
        --tg-secondary-bg: #1e293b;
        --tg-section-bg: #334155;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--tg-bg);
      color: var(--tg-text);
      min-height: 100dvh;
      padding-bottom: 5.5rem;
      -webkit-tap-highlight-color: transparent;
      line-height: 1.5;
    }

    header {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      padding: 1.25rem 1rem 1.125rem;
      position: sticky;
      top: 0;
      z-index: 30;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 1.1;
    }

    .tagline {
      font-size: 1.05rem;
      font-weight: 500;
      opacity: 0.95;
      margin-top: 0.375rem;
    }

    .container {
      padding: 1.25rem 1rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    .product-card {
      background: var(--tg-secondary-bg);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid rgba(226,232,240,0.5);
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      position: relative;
    }

    .dark .product-card {
      border-color: rgba(59,69,89,0.4);
    }

    .product-card:hover,
    .product-card:active {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .img-wrapper {
      aspect-ratio: 4 / 3;
      background: var(--tg-section-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow: hidden;
    }

    .product-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: transform 0.4s ease;
    }

    .product-card:hover .product-img {
      transform: scale(1.06);
    }

    .card-content {
      padding: 1.125rem 1.125rem 1.375rem;
      text-align: center;
    }

    .name {
      font-size: 1.32rem;
      font-weight: 700;
      margin-bottom: 0.375rem;
      line-height: 1.25;
    }

    .size {
      font-size: 0.95rem;
      color: var(--tg-hint);
      margin-bottom: 0.75rem;
    }

    .price {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--success);
      margin: 0.5rem 0 1.125rem;
      letter-spacing: -0.02em;
    }

    .btn {
      background: var(--success);
      color: white;
      border: none;
      padding: 0.95rem;
      border-radius: 1rem;
      font-size: 1.06rem;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 2px 8px rgba(16,185,129,0.18);
    }

    .btn:hover {
      background: #059669;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(16,185,129,0.28);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 6px rgba(16,185,129,0.2);
    }

    .fixed-cart-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--tg-secondary-bg);
      border-top: 1px solid rgba(226,232,240,0.5);
      padding: 0.95rem 1rem;
      box-shadow: 0 -6px 20px rgba(0,0,0,0.12);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 1rem;
      backdrop-filter: blur(10px);
    }

    .dark .fixed-cart-bar {
      border-top-color: rgba(59,69,89,0.5);
    }

    .cart-total {
      font-weight: 700;
      font-size: 1.18rem;
      white-space: nowrap;
      flex: 1;
    }

    .cart-checkout-btn {
      flex: 0 0 auto;
      min-width: 180px;
      background: linear-gradient(to right, #10b981, #059669);
      box-shadow: 0 4px 16px rgba(16,185,129,0.32);
      padding: 1rem 1.5rem;
      font-size: 1.12rem;
    }

    .empty-state {
      text-align: center;
      padding: 5rem 1.5rem 3rem;
      color: var(--tg-hint);
      font-size: 1.15rem;
      line-height: 1.6;
    }

    .empty-emoji {
      font-size: 3.5rem;
      margin-bottom: 1.25rem;
      display: block;
    }

    @media (min-width: 640px) {
      .container { padding-left: 1.5rem; padding-right: 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Grace Products</h1>
  <div class="tagline">Natural • Handcrafted • Made with Care 🌿</div>
</header>

<div class="container">
  <div class="product-grid" id="productGrid"></div>

  <div id="emptyState" class="empty-state" style="display: none;">
    <span class="empty-emoji">🛍️🌱</span>
    Your cart is empty<br>
    Discover our lovingly crafted natural collection
  </div>
</div>

<div class="fixed-cart-bar" id="cartBar" style="display: none;">
  <div class="cart-total">Total: <span id="totalPrice">$0.00</span></div>
  <button class="btn cart-checkout-btn" id="checkoutBtn">View Cart & Checkout</button>
</div>

<script>
// ────────────────────────────────────────────────
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.enableClosingConfirmation?.();

// Apply Telegram theme variables more reliably
const theme = tg.themeParams;
const root = document.documentElement;

root.style.setProperty('--tg-theme-bg-color', theme.bg_color);
root.style.setProperty('--tg-theme-text-color', theme.text_color);
root.style.setProperty('--tg-theme-hint-color', theme.hint_color);
root.style.setProperty('--tg-theme-secondary-bg-color', theme.secondary_bg_color);
root.style.setProperty('--tg-theme-section-bg-color', theme.section_bg_color || theme.secondary_bg_color);
root.style.setProperty('--tg-theme-button-color', theme.button_color);
root.style.setProperty('--tg-theme-button-text-color', theme.button_text_color);

// ────────────────────────────────────────────────
const products = [
  { id: 1, name: "Grace Liquid Soap",      size: "5 liter",  price: 500,  img: "https://i.postimg.cc/NM8r0HyP/5l.jpg"    },
  { id: 2, name: "Grace Hand Wash",        size: "500 ml",   price: 100,  img: "https://i.postimg.cc/zG0y4rss/hand-wash.jpg" },
  { id: 3, name: "Grace Dettol",           size: "500 ml",   price: 100,  img: "https://i.postimg.cc/SNt0P1Z8/dettol.jpg"   },
  { id: 4, name: "Grace Bleach",           size: "800 ml",   price: 100,  img: "https://i.postimg.cc/Bn1zVSPf/bll.jpg"      },
  { id: 5, name: "Grace Bleach Mini",      size: "300 ml",   price: 50,   img: "https://i.postimg.cc/NM8r0HyP/5l.jpg"    },
];

let cart = [];

// ────────────────────────────────────────────────
const productGrid   = document.getElementById("productGrid");
const cartBar       = document.getElementById("cartBar");
const totalPriceEl  = document.getElementById("totalPrice");
const checkoutBtn   = document.getElementById("checkoutBtn");
const emptyState    = document.getElementById("emptyState");

// ────────────────────────────────────────────────
function renderProducts() {
  productGrid.innerHTML = products.map(p => `
    <div class="product-card">
      <div class="img-wrapper">
        <img src="${p.img}" alt="${p.name}" class="product-img" loading="lazy">
      </div>
      <div class="card-content">
        <div class="name">${p.name}</div>
        <div class="size">${p.size}</div>
        <div class="price">$${p.price.toFixed(2)}</div>
        <button class="btn add-to-cart" data-id="${p.id}">
          Add to Cart
        </button>
      </div>
    </div>
  `).join('');
}

// ────────────────────────────────────────────────
function updateCartUI() {
  if (cart.length === 0) {
    cartBar.style.display = "none";
    emptyState.style.display = "block";
    tg.MainButton.hide();
    return;
  }

  const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);

  totalPriceEl.textContent = `$${total.toFixed(2)}`;

  cartBar.style.display = "flex";
  emptyState.style.display = "none";

  tg.MainButton.setText(`Checkout — $${total.toFixed(2)}`);
  tg.MainButton.setParams({ color: "#10b981", text_color: "#ffffff" });
  tg.MainButton.show();
}

// ────────────────────────────────────────────────
productGrid.addEventListener("click", e => {
  const btn = e.target.closest(".add-to-cart");
  if (!btn) return;

  const id = Number(btn.dataset.id);
  const product = products.find(p => p.id === id);
  if (!product) return;

  const existing = cart.find(item => item.id === id);
  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({ ...product, qty: 1 });
  }

  updateCartUI();

  // Optional subtle haptic feedback (Telegram supports it)
  tg.HapticFeedback?.impactOccurred("light");
});

// ────────────────────────────────────────────────
tg.MainButton.onClick(() => {
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);

  tg.showPopup({
    title: "Order Confirmed",
    message: `Total amount: $${total.toFixed(2)}\n\nYour Grace order is being prepared with love 🌿`,
    buttons: [{ type: "ok", text: "Great!" }]
  }, () => {
    // In production → tg.sendData(JSON.stringify(cart))
    // tg.close()
    tg.showAlert("Thank you! (demo mode — cart cleared)");
    cart = [];
    updateCartUI();
  });
});

checkoutBtn.addEventListener("click", () => tg.MainButton.click());

// ────────────────────────────────────────────────
renderProducts();
updateCartUI();
</script>
</body>
</html>
